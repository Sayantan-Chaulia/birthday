<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday</title>
<style>
body { margin:0; background: linear-gradient(to right, #ffdde1, #ee9ca7); text-align:center; font-family: Arial; overflow:hidden; }
h1 { font-size:50px; color:#d10068; margin-top:50px; }
p { font-size:22px; width:70%; margin:auto; line-height:1.6; }
.btn { padding:15px 30px; font-size:20px; background:#ff4b5c; color:white; border:none; border-radius:10px; cursor:pointer; margin-top:20px; }
#countdown { font-size:28px; margin-top:20px; color:#000; }
.heart { position:absolute;  font-size:20px; animation: fall 5s linear infinite; }
@keyframes fall { 0%{transform: translateY(-10vh);} 100%{transform: translateY(110vh);} }
</style>
</head>
<body>
<h1>Happy Birthday Riya 🎂</h1>
<h2>Today is all about YOU 🎉🦋</h2>
<button class='btn' onclick='surprise()'>Click For Surprise 🎁</button>
<p id='message'></p>
<audio autoplay loop>
<source src='https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid' type='audio/midi'>
</audio>
<script>
function surprise(){
document.getElementById('message').innerHTML = 'I just want you to stay happy<br>Valo thakis sob somoy.Jibone onek shanti,safollo ar sundor muhurto asuuk.Keep smiling always..✨<br><br>FROM YOUR FRIEND--Sayantan💕🎊✨🎂';
createEmojis();
}
function createEmojis(){
var emojis = [
  '❤️','💖','💕','💘','💝','💗','💓','💞',
  '🥰','😍','😇','🌸','🌹','🌷',
  '🎂','🎉','🎊','✨','💐','🦋','🌈',
  '🍫','🍰','🎁','💫'
];
for(let i=0;i<60;i++){
  let e = document.createElement('div');
  e.className='heart';
  e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
  e.style.left = Math.random()*100+'vw';
  e.style.fontSize = (Math.random()*20 + 15)+'px';
  e.style.animationDuration = (Math.random()*3+2)+'s';
  document.body.appendChild(e);
}
}
</script>
</body>
</html>
